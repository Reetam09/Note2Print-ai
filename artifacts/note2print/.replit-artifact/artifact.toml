kind = "web"
previewPath = "/"
title = "Note2Print AI"
version = "1.0.0"
id = "artifacts/note2print"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20173

[services.development]
run = "pnpm --filter @workspace/note2print run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/note2print", "run", "build" ]
publicDir = "artifacts/note2print/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20173"
BASE_PATH = "/"
