openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Note2Print AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document operations
  - name: exampapers
    description: Exam paper operations
  - name: uploads
    description: File upload operations
  - name: templates
    description: Document templates
  - name: stats
    description: Dashboard statistics
  - name: openai
    description: OpenAI AI chat, image, and audio operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all saved documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a new document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdate"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /exam-papers:
    get:
      operationId: listExamPapers
      tags: [exampapers]
      summary: List all exam papers
      responses:
        "200":
          description: List of exam papers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamPaper"
    post:
      operationId: createExamPaper
      tags: [exampapers]
      summary: Create a new exam paper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamPaperInput"
      responses:
        "201":
          description: Created exam paper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamPaper"

  /exam-papers/{id}:
    get:
      operationId: getExamPaper
      tags: [exampapers]
      summary: Get an exam paper by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam paper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamPaper"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateExamPaper
      tags: [exampapers]
      summary: Update an exam paper
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamPaperUpdate"
      responses:
        "200":
          description: Updated exam paper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamPaper"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteExamPaper
      tags: [exampapers]
      summary: Delete an exam paper
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /exam-papers/generate:
    post:
      operationId: generateExamPaper
      tags: [exampapers]
      summary: AI-generate a full exam paper from a specification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamGenerateRequest"
      responses:
        "201":
          description: Generated exam paper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamPaper"

  /uploads/image-to-text:
    post:
      operationId: uploadImageToText
      tags: [uploads]
      summary: Upload an image and extract text via OCR + AI cleanup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageUploadInput"
      responses:
        "200":
          description: Extracted and cleaned text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedTextResult"

  /uploads/voice-to-text:
    post:
      operationId: uploadVoiceToText
      tags: [uploads]
      summary: Transcribe a voice recording to text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceUploadInput"
      responses:
        "200":
          description: Transcribed text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedTextResult"

  /ai/format-document:
    post:
      operationId: aiFormatDocument
      tags: [documents]
      summary: AI-format raw text into a clean educational document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormatDocumentInput"
      responses:
        "200":
          description: Formatted document content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormatDocumentResult"

  /ai/grammar-check:
    post:
      operationId: aiGrammarCheck
      tags: [documents]
      summary: AI grammar correction for text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrammarCheckInput"
      responses:
        "200":
          description: Grammar-corrected text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrammarCheckResult"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all document templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentTemplate"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent document and exam paper activity
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /openai/conversations/{id}/voice-messages:
    post:
      operationId: sendOpenaiVoiceMessage
      tags: [openai]
      summary: Send audio and receive a streaming voice response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiVoiceMessageInput"
      responses:
        "200":
          description: SSE stream of transcript and audio chunks
          content:
            text/event-stream: {}
  /openai/generate-image:
    post:
      operationId: generateOpenaiImage
      tags: [openai]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiImageInput"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiImageOutput"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Document:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          description: "class-notes | homework | assignment | worksheet | question-bank | project | practical | exam"
        content:
          type: string
        rawText:
          type: ["string", "null"]
        subject:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        language:
          type: string
        templateId:
          type: ["integer", "null"]
        schoolName:
          type: ["string", "null"]
        teacherName:
          type: ["string", "null"]
        status:
          type: string
          description: "draft | processing | ready"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - type
        - content
        - language
        - status
        - createdAt
        - updatedAt

    DocumentInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        type:
          type: string
        content:
          type: string
        rawText:
          type: string
        subject:
          type: string
        grade:
          type: string
        language:
          type: string
        templateId:
          type: integer
        schoolName:
          type: string
        teacherName:
          type: string
        status:
          type: string
      required:
        - title
        - type

    DocumentUpdate:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
        content:
          type: string
        rawText:
          type: string
        subject:
          type: string
        grade:
          type: string
        language:
          type: string
        templateId:
          type: integer
        schoolName:
          type: string
        teacherName:
          type: string
        status:
          type: string

    ExamPaper:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subject:
          type: string
        grade:
          type: string
        board:
          type: ["string", "null"]
        totalMarks:
          type: integer
        duration:
          type: ["integer", "null"]
        difficulty:
          type: string
          description: "easy | medium | hard | mixed"
        sections:
          type: string
          description: JSON string of sections with questions
        answerKey:
          type: ["string", "null"]
          description: JSON string of answer key
        schoolName:
          type: ["string", "null"]
        teacherName:
          type: ["string", "null"]
        status:
          type: string
          description: "draft | generating | ready"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - subject
        - grade
        - totalMarks
        - difficulty
        - sections
        - status
        - createdAt
        - updatedAt

    ExamPaperInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        subject:
          type: string
        grade:
          type: string
        board:
          type: string
        totalMarks:
          type: integer
        duration:
          type: integer
        difficulty:
          type: string
        sections:
          type: string
        answerKey:
          type: string
        schoolName:
          type: string
        teacherName:
          type: string
        status:
          type: string
      required:
        - title
        - subject
        - grade
        - totalMarks
        - difficulty

    ExamPaperUpdate:
      type: object
      properties:
        title:
          type: string
        subject:
          type: string
        grade:
          type: string
        board:
          type: string
        totalMarks:
          type: integer
        duration:
          type: integer
        difficulty:
          type: string
        sections:
          type: string
        answerKey:
          type: string
        schoolName:
          type: string
        teacherName:
          type: string
        status:
          type: string

    ExamGenerateRequest:
      type: object
      properties:
        subject:
          type: string
        grade:
          type: string
        board:
          type: ["string", "null"]
        chapter:
          type: ["string", "null"]
        topic:
          type: ["string", "null"]
        totalMarks:
          type: integer
        duration:
          type: ["integer", "null"]
        difficulty:
          type: string
        questionTypes:
          type: array
          items:
            type: string
          description: "mcq | fill-blanks | true-false | match | short | long | one-word | assertion | case-study"
        schoolName:
          type: ["string", "null"]
        teacherName:
          type: ["string", "null"]
        sourceText:
          type: ["string", "null"]
          description: Optional source notes to generate questions from
      required:
        - subject
        - grade
        - totalMarks
        - difficulty
        - questionTypes

    ImageUploadInput:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data
        mimeType:
          type: string
          description: "image/jpeg | image/png | application/pdf"
        language:
          type: string
        documentType:
          type: ["string", "null"]
      required:
        - imageBase64
        - mimeType

    VoiceUploadInput:
      type: object
      properties:
        audioBase64:
          type: string
          description: Base64-encoded audio data
        mimeType:
          type: string
        language:
          type: string
      required:
        - audioBase64
        - mimeType

    ExtractedTextResult:
      type: object
      properties:
        rawText:
          type: string
        cleanedText:
          type: string
        language:
          type: string
        confidence:
          type: ["number", "null"]
      required:
        - rawText
        - cleanedText
        - language

    FormatDocumentInput:
      type: object
      properties:
        rawText:
          type: string
        documentType:
          type: string
        subject:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        language:
          type: string
        schoolName:
          type: ["string", "null"]
      required:
        - rawText
        - documentType
        - language

    FormatDocumentResult:
      type: object
      properties:
        formattedContent:
          type: string
        title:
          type: string
        summary:
          type: ["string", "null"]
      required:
        - formattedContent
        - title

    GrammarCheckInput:
      type: object
      properties:
        text:
          type: string
        language:
          type: string
      required:
        - text
        - language

    GrammarCheckResult:
      type: object
      properties:
        correctedText:
          type: string
        corrections:
          type: integer
      required:
        - correctedText
        - corrections

    DocumentTemplate:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        description:
          type: string
        previewUrl:
          type: ["string", "null"]
      required:
        - id
        - name
        - type
        - description

    DashboardStats:
      type: object
      properties:
        totalDocuments:
          type: integer
        totalExamPapers:
          type: integer
        documentsThisWeek:
          type: integer
        examPapersThisWeek:
          type: integer
        byType:
          type: array
          items:
            $ref: "#/components/schemas/TypeCount"
        recentDocuments:
          type: array
          items:
            $ref: "#/components/schemas/Document"
      required:
        - totalDocuments
        - totalExamPapers
        - documentsThisWeek
        - examPapersThisWeek
        - byType
        - recentDocuments

    TypeCount:
      type: object
      properties:
        type:
          type: string
        count:
          type: integer
      required:
        - type
        - count

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        kind:
          type: string
          description: "document | exam-paper"
        title:
          type: string
        type:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - kind
        - title
        - type
        - createdAt

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiVoiceMessageInput:
      type: object
      properties:
        audio:
          type: string
          description: Base64-encoded audio data
      required:
        - audio
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiImageInput:
      type: object
      properties:
        prompt:
          type: string
        size:
          type: string
          enum: ["1024x1024", "512x512", "256x256"]
      required:
        - prompt
    OpenaiImageOutput:
      type: object
      properties:
        b64_json:
          type: string
      required:
        - b64_json
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
